[build]
builder = "nixpacks"

[deploy]
# Run from backend/ so Python imports resolve correctly.
# Excel file is at repo root; loader auto-detects it via parent-dir search.
# Order: migrate schema → seed data → start server
startCommand = "cd /app/backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
